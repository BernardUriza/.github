<body onload="brython({debug: 0})">

  <!-- ═══ LANDING PAGE ═══ -->
  <div class="landing" id="landing">

    <div class="grain"></div>
    <canvas id="particles"></canvas>

    <img class="landing-logo" src="img/bair-logo.png" alt="BAIR" draggable="false">

    <div class="landing-content">
      <p class="landing-subtitle">bernard-org <em>Artificial Intelligence</em> <span class="bair-r-slot" data-r-cycle>Reviewer</span></p>
      <div class="landing-actions">

      <h2>Authenticate</h2>

      <label for="token-input">GitHub Token</label>

             spellcheck="false" autocomplete="off">

      <button class="login-btn" id="login-btn">Sign in</button>

  <!-- ═══ APP SHELL — Bento Grid ═══ -->
  <div class="app" id="app">
    <div class="topbar">
      <div class="logo"><span>BAIR</span> Dashboard <div class="logo-dot"></div></div>
      <div class="topbar-search">
        <span class="search-icon">/</span>
        <input id="global-search" type="search" placeholder="Search issues, PRs, branches..." spellcheck="false" autocomplete="off">
      </div>
      <div class="user">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
      </div>
      <button class="logout" id="logout-btn">Sign out</button>
    </div>
    <div class="bento">
      <div class="g-card control-panel" id="control-panel" style="grid-area:control"></div>
      <div class="g-card stat-card" id="stat-total" style="grid-area:s1"></div>
      <div class="g-card stat-card" id="stat-success" style="grid-area:s2"></div>
      <div class="g-card stat-card" id="stat-time" style="grid-area:s3"></div>
      <div class="g-card stat-card" id="stat-active" style="grid-area:s4"></div>
      <div class="g-card runs-panel" id="runs-panel" style="grid-area:runs"></div>
      <div class="g-card dispatch-panel" id="dispatch-resolve" style="grid-area:resolve"></div>
      <div class="g-card dispatch-panel" id="dispatch-review" style="grid-area:review"></div>
      <div class="g-card health-panel" id="health-panel" style="grid-area:health"></div>
      <div class="g-card runs-panel" id="pulls-panel" style="grid-area:prs"></div>
    </div>

    <!-- ═══ BAIR Chat (floating, bottom-right) ═══ -->
    <div id="bair-chat" class="bair-chat-panel"></div>
  </div>

  <!-- ═══ PARTICLES (vanilla JS) ═══ -->
  <script src="js/particles.js"></script>

  <!-- LANDING SLOT MACHINE -->
  <script>
  (function () {
    const WORDS = [
      "Reviewer", "Remedier", "Resolver",
      "Refactorer", "Researcher", "Releaser", "Reporter", "Reanimator",
      "Ramificator", "Revolver", "Renegotiator", "Regurgitator",
      "Roastmaster", "Ravioli", "Reggaetoner", "Rumiator", "Repartidor",
      "Resucitator", "Reptilianator", "Ranchero", "Rasputin", "Roomba"
    ];
    const CHARS = "!<>-_\/[]{}=+*^?#________";
    class TextScramble {
      constructor(el) { this.el = el; this.queue = []; this.frame = 0; this.update = this.update.bind(this); }
      setText(newText) {
        const oldText = this.el.innerText;
        const length = Math.max(oldText.length, newText.length);
        const promise = new Promise(res => this.resolve = res);
        this.queue = [];
        for (let i = 0; i < length; i++) {
          const from = oldText[i] || "";
          const to = newText[i] || "";
          const start = Math.floor(Math.random() * 40);
          const end = start + Math.floor(Math.random() * 40);
          this.queue.push({ from, to, start, end });
        }
        cancelAnimationFrame(this.frameRequest);
        this.frame = 0;
        this.update();
        return promise;
      }
      update() {
        let output = "";
        let complete = 0;
        for (let i = 0, n = this.queue.length; i < n; i++) {
          let { from, to, start, end, char } = this.queue[i];
          if (this.frame >= end) { complete++; output += to; }
          else if (this.frame >= start) {
            if (!char || Math.random() < 0.28) {
              char = CHARS[Math.floor(Math.random() * CHARS.length)];
              this.queue[i].char = char;
            }
            output += '<span style="opacity:0.55">' + char + '</span>';
          } else { output += from; }
        }
        this.el.innerHTML = output;
        if (complete === this.queue.length) this.resolve();
        else { this.frameRequest = requestAnimationFrame(this.update); this.frame++; }
      }
    }
    const el = document.querySelector("[data-r-cycle]");
    if (!el) return;
    const fx = new TextScramble(el);
    let i = 1;
    function next() {
      fx.setText(WORDS[i % WORDS.length]).then(() => setTimeout(next, 1800));
      i++;
    }
    setTimeout(next, 1800);
  })();
  </script>


  <!-- ═══ BRYTHON APP (entry point) ═══ -->
  <script type="text/python">
from py.app import *  # noqa: F403 — boots the entire app
  </script>
</body>
